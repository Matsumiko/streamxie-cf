name: QA Smoke

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "Target base URL for smoke tests"
        required: false
        default: "https://streamxie.pages.dev"
      run_auth_flow:
        description: "Run auth/account-state write flow smoke (creates temporary QA account)"
        required: false
        type: boolean
        default: false
      run_ui_auth_flow:
        description: "Run browser UI auth journey smoke (creates temporary QA account)"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.smoke_base_url || 'https://streamxie.pages.dev' }}
      SMOKE_RUN_AUTH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_auth_flow == 'true' && '1' || '0' }}
      SMOKE_RUN_UI_AUTH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_ui_auth_flow == 'true' && '1' || '0' }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run qa:smoke
