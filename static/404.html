<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 | Halaman tidak ditemukan - streamXie</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090f1a;
        --surface: #101827;
        --border: #233044;
        --text: #f5f7fb;
        --muted: #9aacbf;
        --accent: #10cfa6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #122036, var(--bg) 45%);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 20px;
      }
      .panel {
        width: min(760px, 100%);
        border: 1px solid var(--border);
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(16, 24, 39, 0.94), rgba(16, 24, 39, 0.86));
        padding: 28px;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        border: 1px solid rgba(16, 207, 166, 0.55);
        color: var(--accent);
        padding: 6px 10px;
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-weight: 700;
      }
      h1 {
        margin: 16px 0 12px;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.2;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        padding: 10px 14px;
        font-weight: 600;
      }
      a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .primary {
        border-color: rgba(16, 207, 166, 0.45);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <span class="badge">Error 404</span>
      <h1>Halaman tidak ditemukan</h1>
      <p>
        URL yang kamu tuju tidak tersedia atau sudah dipindahkan. Kembali ke halaman utama
        streamXie atau lanjut jelajahi katalog.
      </p>
      <nav class="links" aria-label="Navigasi halaman 404">
        <a class="primary" href="/">Beranda</a>
        <a href="/browse">Jelajah Katalog</a>
        <a href="/search">Pencarian</a>
        <a href="/about">Tentang streamXie</a>
      </nav>
    </main>
  </body>
</html>
